version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vulnmain-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-vulnmain}
      MYSQL_USER: ${DB_USER:-vulnmain}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # ports:
    #   - "33060:3306"  # 如需外部访问数据库，取消此注释
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vulnmain-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-vulnmain}
      DB_USER: ${DB_USER:-vulnmain}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vulnmain.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-}
      GOOGLE_ALLOWED_EMAIL_SUFFIX: ${GOOGLE_ALLOWED_EMAIL_SUFFIX:-}
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  app_uploads:
